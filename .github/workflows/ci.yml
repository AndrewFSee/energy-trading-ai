name: CI

on:
  push:
    branches: [main, develop, "copilot/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov types-requests types-PyYAML
          pip install numpy pandas scikit-learn pyyaml python-dotenv feedparser
          pip install yfinance requests tenacity ta

      - name: Run Ruff linter
        run: ruff check src/ tests/ scripts/ app/
        continue-on-error: false

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/ scripts/ app/

      - name: Run mypy type checker
        run: |
          mypy src/ tests/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Don't fail CI on type errors during early development

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          # Disable network calls in tests
          PYTHONPATH: .

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
